<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillBridgeAI Assistant</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="chat-container">
        <header class="chat-header">
            <div class="bot-info">
                <i class="fa-solid fa-robot bot-avatar"></i>
                <div>
                    <h2>SkillBridgeAI</h2>
                    <span class="status">Online</span>
                </div>
            </div>
            <button id="clear-chat" title="Clear Chat Session"><i class="fa-solid fa-trash"></i></button>
        </header>

        <main class="chat-main" id="chat-box">
            <!-- Messages will be appended here -->
            <div class="message bot-message">
                <div class="message-content">
                    Hello! I'm SkillBridgeAI, your personal career mentor. How can I help you today with your career,
                    resume, or interview preparation?
                </div>
            </div>
        </main>

        <div class="typing-indicator hidden" id="typing-indicator">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <footer class="chat-footer">
            <form id="chat-form">
                <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off" required>
                <button type="submit" id="send-btn" disabled>
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
        </footer>
    </div>

    <!-- Markdown Parser to convert asterisks to bold and bullets -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
